<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
    <defs>
        <radialGradient id="blob1" cx="20%" cy="20%" r="50%">
            <stop offset="0%" stop-color="#ff2a5f" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#ff2a5f" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="blob2" cx="80%" cy="80%" r="50%">
            <stop offset="0%" stop-color="#ff7a00" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#ff7a00" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="blob3" cx="50%" cy="50%" r="40%">
            <stop offset="0%" stop-color="#4158d0" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#4158d0" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#a0a0b0" />
        </linearGradient>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&amp;display=swap');
            .title { font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 64px; font-weight: 800; fill: url(#textGrad); letter-spacing: -2px; text-anchor: middle; }
            .subtitle { font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 400; fill: #f0f0f5; letter-spacing: 6px; text-anchor: middle; opacity: 0.8; }
            .glass { fill: rgba(255, 255, 255, 0.04); stroke: rgba(255, 255, 255, 0.08); stroke-width: 1; }
            .search-text { font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif; font-size: 14px; fill: #a0a0b0; }
        </style>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="300" fill="#0d0e15" />
    
    <!-- Blobs Background -->
    <circle cx="100" cy="50" r="300" fill="url(#blob1)" />
    <circle cx="700" cy="250" r="350" fill="url(#blob2)" />
    <circle cx="400" cy="150" r="250" fill="url(#blob3)" />
    
    <!-- Glass Window Panel -->
    <rect x="80" y="40" width="640" height="220" rx="24" class="glass" />
    
    <!-- Window Mac Controls -->
    <circle cx="110" cy="70" r="6" fill="#ff5f56" />
    <circle cx="130" cy="70" r="6" fill="#ffbd2e" />
    <circle cx="150" cy="70" r="6" fill="#27c93f" />
    
    <!-- Search Bar Mock UI -->
    <rect x="200" y="195" width="400" height="40" rx="20" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.05)" />
    <!-- Search Icon -->
    <circle cx="230" cy="215" r="6" fill="none" stroke="#a0a0b0" stroke-width="2" />
    <line x1="234" y1="219" x2="238" y2="223" stroke="#a0a0b0" stroke-width="2" stroke-linecap="round" />
    <text x="250" y="220" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#a0a0b0">Search for any song...</text>
    
    <!-- Main Title Text -->
    <text x="400" y="145" class="title">LYRICS FINDER</text>
    <text x="400" y="175" class="subtitle">PURE FRONTEND EXPERIENCE</text>
</svg>
